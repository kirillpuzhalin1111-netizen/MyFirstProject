name: CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Тестирование
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v

  lint:
    name: Проверка качества кода
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Run flake8
      run: |
        flake8 src/ --count --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true

  build:
    name: Сборка проекта
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install pyinstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --name MebelFlow src/main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MebelFlow-build
        path: dist/
        retention-days: 7

  finish:
    name: Завершение
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    
    steps:
    - name: Summary
      run: |
        echo "✅ Все проверки пройдены успешно!"
        echo "📊 Тесты выполнены"
        echo "🔍 Код проверен линтером"
        echo "📦 Проект собран"
