name: CI/CD

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Тестирование
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Run simple tests
      run: |
        python -c "assert 1+1==2"
        python -c "print('Tests passed')"
    
    - name: Success message
      run: echo "✅ Все тесты пройдены успешно!"
