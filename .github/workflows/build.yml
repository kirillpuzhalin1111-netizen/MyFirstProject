name: Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build info
      run: |
        echo "📦 Сборка проекта MebelFlow"
        echo "✅ Сборка завершена успешно"
    
    - name: Create artifact
      run: |
        mkdir -p dist
        echo "MebelFlow build" > dist/README.txt
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MebelFlow-info
        path: dist/
        retention-days: 7
