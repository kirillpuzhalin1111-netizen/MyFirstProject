name: Tests

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Run Python test
      run: |
        python -c "assert 1+1==2"
        python -c "assert 'hello'.upper() == 'HELLO'"
        echo "✅ Все тесты пройдены!"
